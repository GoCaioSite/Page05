<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Caio Movies</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(135deg,#ffffff,#f4f4f4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
background:#fff;
padding:45px 35px;
max-width:430px;
width:90%;
text-align:center;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
animation:fadeIn .8s ease;
}

.logo{
width:95px;
height:95px;
margin:auto;
margin-bottom:30px;
animation:float 3s ease-in-out infinite;
}

h1{
font-size:34px;
color:#111;
margin-bottom:18px;
}

p{
font-size:16px;
line-height:1.8;
color:#666;
margin-bottom:35px;
}

.button{
display:inline-block;
width:100%;
padding:16px;
background:#000;
color:#fff;
text-decoration:none;
font-size:17px;
font-weight:700;
border-radius:14px;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.18);
}

.button:hover{
background:#222;
transform:translateY(-3px);
box-shadow:0 18px 40px rgba(0,0,0,.25);
}

.footer{
margin-top:30px;
font-size:13px;
color:#999;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

@media(max-width:600px){

.container{
padding:35px 25px;
}

h1{
font-size:28px;
}

.button{
font-size:16px;
}

}
</style>

</head>
